    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #06050a; color: #f0fdf4; margin: 0; padding: 20px; }
        .container { max-width: 550px; margin: 0 auto; }
        
        /* প্রোফাইল কার্ড */
        .profile-card { text-align: center; background: #0f172a; border-radius: 20px; padding: 30px 20px; margin-bottom: 25px; border: 1px solid #10b981; box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
        .avatar { width: 90px; height: 90px; border-radius: 50%; border: 3px solid #10b981; padding: 3px; margin-bottom: 15px; object-fit: cover; background: #000; }
        .profile-card h1 { margin: 0; font-size: 24px; color: #10b981; letter-spacing: 1px; font-weight: bold; }
        .profile-card p { margin: 5px 0 15px; font-size: 14px; color: #94a3b8; }
        
        /* সোশ্যাল লিঙ্ক */
        .social-links { margin-bottom: 5px; }
        .social-links a { color: #f0fdf4; text-decoration: none; margin: 0 15px; font-size: 24px; transition: 0.3s; }
        .social-links a:hover { color: #10b981; }

        /* অ্যাপ লিস্ট */
        .app-list { display: grid; gap: 12px; margin-bottom: 30px; }
        .app-item { background: #1e293b; border-radius: 15px; padding: 15px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #334155; transition: 0.3s; }
        .app-item:active { transform: scale(0.97); border-color: #10b981; }
        .app-info { display: flex; align-items: center; text-align: left; }
        .app-icon-img { width: 52px; height: 52px; border-radius: 12px; margin-right: 15px; object-fit: cover; background: #0f172a; border: 1px solid #334155; }
        .app-details h3 { margin: 0; font-size: 16px; color: #f1f5f9; font-weight: 600; }
        .app-details p { margin: 3px 0 0; font-size: 12px; color: #94a3b8; }
        .btn-get { background: #10b981; color: white; text-decoration: none; padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: bold; }

        /* কন্টাক্ট ফরম */
        .contact-section { background: #0f172a; border-radius: 20px; padding: 25px; border: 1px solid #10b981; margin-top: 30px; margin-bottom: 50px; }
        .contact-section h2 { font-size: 20px; color: #10b981; margin-bottom: 20px; text-align: center; }
        .contact-form input, .contact-form textarea { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #334155; background: #06050a; color: white; box-sizing: border-box; outline: none; }
        .btn-submit { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #10b981; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
